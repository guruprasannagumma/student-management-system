<!DOCTYPE html>
<html>
<head>
    <title>Student App</title>

    <style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}
input {
    margin: 5px;
    padding: 8px;
}
button {
    margin: 5px;
    padding: 8px 12px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #0056b3;
}
li {
    margin: 10px 0;
    background: white;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>
<body>

<h2>Add Student</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="course" placeholder="Enter Course">
<button onclick="addStudent()">Add Student</button>

<h2>Student List</h2>
<ul id="list"></ul>

<script>

// 🔹 LOAD students
function loadStudents() {
    fetch("http://localhost:8082/students")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(s => {
            let li = document.createElement("li");
            li.innerHTML = s.name + " - " + s.course +
                ' <button onclick="deleteStudent(' + s.id + ')">Delete</button>' +
                ' <button onclick="editStudent(' + s.id + ', \'' + s.name + '\', \'' + s.course + '\')">Edit</button>';
            list.appendChild(li);
        });
    });
}

// 🔹 ADD student
function addStudent() {
    let name = document.getElementById("name").value;
    let course = document.getElementById("course").value;

    fetch("http://localhost:8082/students", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            course: course
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Added: " + data.name);

        document.getElementById("name").value = "";
        document.getElementById("course").value = "";

        loadStudents();
    });
}

// 🔹 DELETE student
function deleteStudent(id) {
    fetch("http://localhost:8082/students/" + id, {
        method: "DELETE"
    })
    .then(() => loadStudents());
}

// 🔹 UPDATE (EDIT) student
function editStudent(id, name, course) {
    let newName = prompt("Enter new name:", name);
    let newCourse = prompt("Enter new course:", course);

    if (newName && newCourse) {
        fetch("http://localhost:8082/students/" + id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: newName,
                course: newCourse
            })
        })
        .then(() => loadStudents());
    }
}

// 🔹 Load when page opens
loadStudents();

</script>

</body>
</html>
